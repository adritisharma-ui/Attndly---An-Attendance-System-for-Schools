<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attndly - Login & Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1B3D6E 0%, #2E6BC4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background: #F4F7FB;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            background: none;
            font-size: 16px;
        }
        .tab.active {
            background: white;
            color: #2E6BC4;
            border-bottom: 3px solid #2E6BC4;
        }
        .form-container {
            padding: 30px;
        }
        .form {
            display: none;
        }
        .form.active {
            display: block;
        }
        h1 {
            color: #1B3D6E;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        h1 span {
            color: #2E6BC4;
        }
        .subtitle {
            color: #6B7A90;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #3D4F66;
            font-weight: 500;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #D3DCE8;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2E6BC4;
            box-shadow: 0 0 0 3px rgba(46,107,196,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2E6BC4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background: #1B3D6E;
            transform: translateY(-2px);
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.error {
            background: #FDEEEE;
            color: #C0392B;
            border-left: 4px solid #C0392B;
        }
        .message.success {
            background: #E2F5EA;
            color: #1A7A4A;
            border-left: 4px solid #1A7A4A;
        }
        .section-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .section-input input {
            flex: 1;
        }
        .add-section {
            background: #6B7A90;
            margin-top: 0;
            width: auto;
            padding: 8px 15px;
        }
        .sections-list {
            margin-top: 10px;
        }
        .section-tag {
            display: inline-block;
            background: #E2F5EA;
            color: #1A7A4A;
            padding: 5px 10px;
            border-radius: 20px;
            margin: 5px;
            font-size: 12px;
        }
        .demo-hint {
            margin-top: 20px;
            padding: 10px;
            background: #F4F7FB;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            color: #6B7A90;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Sign In</button>
            <button class="tab" onclick="switchTab('signup')">Create Account</button>
        </div>
        
        <div class="form-container">
            <!-- Login Form -->
            <div id="loginForm" class="form active">
                <h1>att<span>ndly</span></h1>
                <div class="subtitle">Welcome back! Please sign in</div>
                
                <div id="loginMessage" class="message"></div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="teacher@school.edu" value="adriti@gmail.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" value="09112006">
                </div>
                <button onclick="login()">Sign In →</button>
                
               
            </div>
            
            <!-- Sign Up Form -->
            <div id="signupForm" class="form">
                <h1>Create <span>Account</span></h1>
                <div class="subtitle">Join Attndly as a teacher</div>
                
                <div id="signupMessage" class="message"></div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="e.g., Prof. Ananya Sharma">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="teacher@school.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Minimum 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Re-enter password">
                </div>
                <div class="form-group">
                    <label>Sections You Teach</label>
                    <div class="section-input">
                        <input type="text" id="sectionName" placeholder="e.g., 10A:Mathematics">
                        <button type="button" class="add-section" onclick="addSection()">+ Add</button>
                    </div>
                    <div id="sectionsList" class="sections-list"></div>
                    <small style="color: #6B7A90;">Format: Class:Subject (e.g., 10A:Mathematics)</small>
                </div>
                <button onclick="signup()">Create Account →</button>
            
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let sectionsArray = [];
        
        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update forms
            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('signupForm').classList.remove('active');
            } else {
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('signupForm').classList.add('active');
            }
            
            // Clear messages
            clearMessages();
        }
        
        function clearMessages() {
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('signupMessage').style.display = 'none';
        }
        
        function showMessage(element, message, isError = true) {
            const msgDiv = document.getElementById(element);
            msgDiv.textContent = message;
            msgDiv.className = isError ? 'message error' : 'message success';
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 5000);
        }
        
        function addSection() {
            const sectionInput = document.getElementById('sectionName');
            const sectionValue = sectionInput.value.trim();
            
            if (!sectionValue) {
                showMessage('signupMessage', 'Please enter section in format: Class:Subject', true);
                return;
            }
            
            if (!sectionValue.includes(':')) {
                showMessage('signupMessage', 'Please use format: Class:Subject (e.g., 10A:Mathematics)', true);
                return;
            }
            
            sectionsArray.push(sectionValue);
            renderSections();
            sectionInput.value = '';
        }
        
        function removeSection(index) {
            sectionsArray.splice(index, 1);
            renderSections();
        }
        
        function renderSections() {
            const container = document.getElementById('sectionsList');
            container.innerHTML = '';
            sectionsArray.forEach((section, index) => {
                const [className, subject] = section.split(':');
                const tag = document.createElement('span');
                tag.className = 'section-tag';
                tag.innerHTML = `${className} - ${subject} <span style="cursor:pointer; margin-left:5px;" onclick="removeSection(${index})">✕</span>`;
                container.appendChild(tag);
            });
        }
        
        async function signup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            // Validation
            if (!name || !email || !password) {
                showMessage('signupMessage', 'All fields are required!', true);
                return;
            }
            
            if (password.length < 6) {
                showMessage('signupMessage', 'Password must be at least 6 characters!', true);
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('signupMessage', 'Passwords do not match!', true);
                return;
            }
            
            if (sectionsArray.length === 0) {
                showMessage('signupMessage', 'Please add at least one section!', true);
                return;
            }
            
            // Show loading
            const signupBtn = event.target;
            signupBtn.textContent = 'Creating Account...';
            signupBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        password: password,
                        sections: sectionsArray
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('signupMessage', '✅ Account created successfully! Please login.', false);
                    // Clear form
                    document.getElementById('signupName').value = '';
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('signupPassword').value = '';
                    document.getElementById('signupConfirmPassword').value = '';
                    sectionsArray = [];
                    renderSections();
                    // Switch to login after 2 seconds
                    setTimeout(() => {
                        document.querySelector('.tab').click();
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                } else {
                    showMessage('signupMessage', data.error || 'Registration failed!', true);
                }
            } catch (error) {
                console.error('Signup error:', error);
                showMessage('signupMessage', 'Server error. Please make sure the backend is running.', true);
            } finally {
                signupBtn.textContent = 'Create Account →';
                signupBtn.disabled = false;
            }
        }
        
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('loginMessage', 'Please enter email and password!', true);
                return;
            }
            
            // Show loading
            const loginBtn = event.target;
            loginBtn.textContent = 'Signing In...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    showMessage('loginMessage', data.error || 'Login failed!', true);
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('loginMessage', 'Cannot connect to server. Make sure backend is running on port 3000', true);
            } finally {
                loginBtn.textContent = 'Sign In →';
                loginBtn.disabled = false;
            }
        }
        
        // Auto-fill demo credentials on page load
        window.onload = () => {
            // Check if we have any existing session
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
