<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attndly - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F4F7FB; }
        nav {
            background: #1B3D6E; color: white;
            padding: 15px 30px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #2E6BC4; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-user { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; }

        /* ── Notification Bell ── */
        .notif-btn {
            position: relative; background: rgba(255,255,255,0.1);
            border: none; color: white; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .notif-btn:hover { background: rgba(255,255,255,0.25); }
        .notif-badge {
            position: absolute; top: -4px; right: -4px;
            background: #E53E3E; color: white; font-size: 10px;
            font-weight: bold; min-width: 18px; height: 18px;
            border-radius: 9px; display: flex; align-items: center;
            justify-content: center; padding: 0 4px;
            border: 2px solid #1B3D6E;
        }
        .notif-badge.hidden { display: none; }

        /* ── Notification Panel ── */
        .notif-panel {
            display: none; position: fixed; top: 65px; right: 20px;
            width: 380px; max-height: 500px; background: white;
            border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            z-index: 999; overflow: hidden; flex-direction: column;
        }
        .notif-panel.open { display: flex; }
        .notif-panel-header {
            padding: 16px 20px; background: #1B3D6E; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .notif-panel-header h3 { font-size: 15px; }
        .mark-all-read {
            font-size: 12px; color: #93C5FD; cursor: pointer;
            background: none; border: none; text-decoration: underline;
        }
        .notif-list { overflow-y: auto; flex: 1; }
        .notif-item {
            padding: 14px 18px; border-bottom: 1px solid #F1F5F9;
            cursor: pointer; transition: background 0.15s; display: flex; gap: 12px;
        }
        .notif-item:hover { background: #F8FAFF; }
        .notif-item.unread { background: #EFF6FF; }
        .notif-item.unread:hover { background: #DBEAFE; }
        .notif-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
        .notif-content { flex: 1; }
        .notif-title { font-size: 13px; font-weight: 600; color: #1E3A5F; margin-bottom: 3px; }
        .notif-msg { font-size: 12px; color: #6B7A90; line-height: 1.4; }
        .notif-meta { font-size: 11px; color: #9CA3AF; margin-top: 4px; }
        .notif-dot { width: 8px; height: 8px; background: #2563EB; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
        .notif-empty { padding: 40px; text-align: center; color: #9CA3AF; font-size: 14px; }

        /* type colours */
        .type-low_attendance .notif-icon::after { content: "⚠️"; }
        .type-attendance_alert .notif-icon::after { content: "🔔"; }
        .type-reminder .notif-icon::after { content: "⏰"; }
        .type-general .notif-icon::after { content: "📢"; }

        button {
            background: #2E6BC4; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 10px;
        }
        button:hover { background: #1B3D6E; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: white; padding: 20px; border-radius: 12px;
            text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-number { font-size: 32px; font-weight: bold; color: #1B3D6E; }
        .sections { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .section-card {
            background: white; padding: 20px; border-radius: 12px;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .section-card:hover { transform: translateY(-5px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .section-name { font-size: 20px; font-weight: bold; color: #1B3D6E; }
        .section-subject { color: #6B7A90; margin: 5px 0; }
        .section-stats {
            display: flex; justify-content: space-around; margin: 15px 0;
            padding: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee;
        }
        .stat-value.present { color: #1A7A4A; font-weight: bold; font-size: 18px; }
        .stat-value.absent  { color: #C0392B; font-weight: bold; font-size: 18px; }
        .stat-value.late    { color: #B36A00; font-weight: bold; font-size: 18px; }
        .student-count { color: #6B7A90; font-size: 14px; }
        .greeting { margin-bottom: 30px; }
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #1B3D6E; color: white; padding: 12px 24px;
            border-radius: 8px; display: none; z-index: 1000; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">att<span>ndly</span></div>
        <div class="nav-right">
            <button class="notif-btn" id="notifBtn" onclick="toggleNotifPanel()">
                🔔
                <span class="notif-badge hidden" id="notifBadge">0</span>
            </button>
            <span class="nav-user" id="userName"></span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notifPanel">
        <div class="notif-panel-header">
            <h3>🔔 Notifications</h3>
            <button class="mark-all-read" onclick="markAllRead()">Mark all as read</button>
        </div>
        <div class="notif-list" id="notifList">
            <div class="notif-empty">Loading...</div>
        </div>
    </div>

    <div class="container">
        <div class="greeting"><h1 id="greeting"></h1></div>
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalStudents">0</div><div>Total Students</div></div>
            <div class="stat-card"><div class="stat-number" id="presentToday">0</div><div>Present Today</div></div>
            <div class="stat-card"><div class="stat-number" id="absentToday">0</div><div>Absent</div></div>
            <div class="stat-card"><div class="stat-number" id="lateToday">0</div><div>Late</div></div>
        </div>
        <h2 style="margin-bottom: 20px;">📚 Your Sections</h2>
        <div class="sections" id="sections"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user') || '{}');
        if (!token) window.location.href = 'login.html';

        document.getElementById('userName').textContent = user.name || 'Teacher';
        const hour = new Date().getHours();
        const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
        document.getElementById('greeting').innerHTML = `${greet}, ${user.name ? user.name.split(' ')[0] : 'Teacher'}! 👋`;

        // ── Close panel when clicking outside ──
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('notifPanel');
            const btn   = document.getElementById('notifBtn');
            if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('open');
            }
        });

        function toggleNotifPanel() {
            const panel = document.getElementById('notifPanel');
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) loadNotifications();
        }

        function timeAgo(dateStr) {
            const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
            if (diff < 60) return 'just now';
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return `${Math.floor(diff/86400)}d ago`;
        }

        async function loadNotifications() {
            try {
                const res = await fetch(`${API_URL}/notifications`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const notifications = await res.json();
                renderNotifications(notifications);
            } catch (e) {
                document.getElementById('notifList').innerHTML = '<div class="notif-empty">Could not load notifications.</div>';
            }
        }

        async function loadUnreadCount() {
            try {
                const res = await fetch(`${API_URL}/notifications/unread-count`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                const badge = document.getElementById('notifBadge');
                if (data.count > 0) {
                    badge.textContent = data.count > 99 ? '99+' : data.count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            } catch (e) { /* silent fail */ }
        }

        function renderNotifications(notifications) {
            const list = document.getElementById('notifList');
            if (!notifications.length) {
                list.innerHTML = '<div class="notif-empty">🎉 You\'re all caught up!</div>';
                return;
            }
            const typeIcons = {
                low_attendance:  '⚠️',
                attendance_alert:'🔔',
                reminder:        '⏰',
                general:         '📢'
            };
            list.innerHTML = notifications.map(n => `
                <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="markRead(${n.id}, this)">
                    <div class="notif-icon">${typeIcons[n.type] || '🔔'}</div>
                    <div class="notif-content">
                        <div class="notif-title">${n.title}</div>
                        <div class="notif-msg">${n.message}</div>
                        <div class="notif-meta">${n.section_name ? n.section_name + ' · ' : ''}${timeAgo(n.created_at)}</div>
                    </div>
                    ${!n.is_read ? '<div class="notif-dot"></div>' : ''}
                </div>
            `).join('');
        }

        async function markRead(id, el) {
            try {
                await fetch(`${API_URL}/notifications/${id}/read`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                el.classList.remove('unread');
                el.querySelector('.notif-dot')?.remove();
                loadUnreadCount();
            } catch (e) { /* silent */ }
        }

        async function markAllRead() {
            try {
                await fetch(`${API_URL}/notifications/mark-all-read`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadNotifications();
                loadUnreadCount();
            } catch (e) { /* silent */ }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#C0392B' : '#1A7A4A';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        async function loadDashboard() {
            try {
                const statsRes = await fetch(`${API_URL}/dashboard/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const stats = await statsRes.json();
                document.getElementById('totalStudents').textContent = stats.total_students || 0;
                document.getElementById('presentToday').textContent  = stats.present_today  || 0;
                document.getElementById('absentToday').textContent   = stats.absent_today   || 0;
                document.getElementById('lateToday').textContent     = stats.late_today     || 0;

                const sectionsRes = await fetch(`${API_URL}/teacher/sections`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const sections = await sectionsRes.json();
                const container = document.getElementById('sections');
                container.innerHTML = '';
                sections.forEach(section => {
                    const card = document.createElement('div');
                    card.className = 'section-card';
                    card.innerHTML = `
                        <div class="section-name">${section.section_name}</div>
                        <div class="section-subject">${section.subject}</div>
                        <div class="section-stats">
                            <div><span class="stat-value present">${section.present_count || 0}</span><br>Present</div>
                            <div><span class="stat-value absent">${section.absent_count  || 0}</span><br>Absent</div>
                            <div><span class="stat-value late">${section.late_count    || 0}</span><br>Late</div>
                        </div>
                        <div class="student-count">📖 ${section.total_students} students</div>
                    `;
                    card.onclick = () => openAttendance(section.id, section.section_name, section.subject);
                    container.appendChild(card);
                });
            } catch (error) {
                showToast('Error loading dashboard', true);
            }
        }

        async function openAttendance(sectionId, sectionName, subject) {
            try {
                const response = await fetch(`${API_URL}/section/${sectionId}/students`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const students = await response.json();
                const today = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                const modal = document.createElement('div');
                modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;justify-content:center;align-items:center;';

                let attendanceData = {};
                students.forEach(s => { if (s.today_status) attendanceData[s.id] = s.today_status; });

                function updateStats() {
                    let p=0, a=0, l=0;
                    Object.values(attendanceData).forEach(st => {
                        if (st==='present') p++; else if (st==='absent') a++; else if (st==='late') l++;
                    });
                    const u = students.length - p - a - l;
                    const d = document.getElementById('attendance-stats');
                    if (d) d.innerHTML = `<span style="color:#1A7A4A"> Present: ${p}</span> | <span style="color:#C0392B"> Absent: ${a}</span> | <span style="color:#B36A00"> Late: ${l}</span> | <span style="color:#6B7A90"> Unmarked: ${u}</span>`;
                }

                function renderStudents() {
                    const el = document.getElementById('students-list');
                    el.innerHTML = '';
                    students.forEach(student => {
                        const cs = attendanceData[student.id] || '';
                        const row = document.createElement('div');
                        row.style.cssText = 'display:grid;grid-template-columns:100px 1fr 200px;padding:12px 20px;border-bottom:1px solid #eee;align-items:center;';
                        row.innerHTML = `
                            <div style="font-weight:600;color:#1B3D6E;">${student.roll_number}</div>
                            <div>${student.name}</div>
                            <div style="display:flex;gap:8px;">
                                <button class="att-btn" data-id="${student.id}" data-status="present" style="padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;${cs==='present'?'background:#1A7A4A;color:white;':'background:#e0e0e0;color:#666;'}">P</button>
                                <button class="att-btn" data-id="${student.id}" data-status="absent"  style="padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;${cs==='absent' ?'background:#C0392B;color:white;':'background:#e0e0e0;color:#666;'}">A</button>
                                <button class="att-btn" data-id="${student.id}" data-status="late"    style="padding:6px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:600;${cs==='late'   ?'background:#B36A00;color:white;':'background:#e0e0e0;color:#666;'}">L</button>
                            </div>`;
                        el.appendChild(row);
                    });
                    el.querySelectorAll('.att-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = parseInt(btn.dataset.id), st = btn.dataset.status;
                            attendanceData[id] = st;
                            btn.closest('div').querySelectorAll('.att-btn').forEach(b => { b.style.background='#e0e0e0'; b.style.color='#666'; });
                            btn.style.background = st==='present'?'#1A7A4A':st==='absent'?'#C0392B':'#B36A00';
                            btn.style.color = 'white';
                            updateStats();
                        });
                    });
                }

                modal.innerHTML = `
                    <div style="background:white;border-radius:16px;width:90%;max-width:800px;max-height:90%;overflow:auto;">
                        <div style="background:#1B3D6E;color:white;padding:20px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;">
                            <div><h2>${sectionName} — ${subject}</h2><p style="margin-top:5px;opacity:0.9;">${today}</p></div>
                            <button id="closeModal" style="background:none;border:none;color:white;font-size:24px;cursor:pointer;">&times;</button>
                        </div>
                        <div style="padding:20px;">
                            <div style="display:flex;gap:10px;margin-bottom:20px;">
                                <button id="markAllPresent" style="background:#1A7A4A;color:white;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;">✓ Mark All Present</button>
                                <button id="markAllAbsent"  style="background:#C0392B;color:white;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;">✗ Mark All Absent</button>
                            </div>
                            <div id="attendance-stats" style="margin-bottom:15px;padding:10px;background:#f5f5f5;border-radius:8px;text-align:center;"></div>
                            <div style="background:#f9f9f9;border-radius:8px;overflow:hidden;">
                                <div style="display:grid;grid-template-columns:100px 1fr 200px;background:#2E6BC4;color:white;padding:12px 20px;font-weight:600;">
                                    <div>Roll No</div><div>Student Name</div><div>Attendance</div>
                                </div>
                                <div id="students-list"></div>
                            </div>
                            <div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;">
                                <button id="cancelBtn" style="background:#6B7A90;padding:10px 20px;">Cancel</button>
                                <button id="saveBtn"   style="background:#2E6BC4;padding:10px 30px;">Save Attendance</button>
                            </div>
                        </div>
                    </div>`;

                document.body.appendChild(modal);
                renderStudents(); updateStats();
                document.getElementById('closeModal').onclick = () => modal.remove();
                document.getElementById('cancelBtn').onclick  = () => modal.remove();
                document.getElementById('markAllPresent').onclick = () => { students.forEach(s => attendanceData[s.id]='present'); renderStudents(); updateStats(); };
                document.getElementById('markAllAbsent').onclick  = () => { students.forEach(s => attendanceData[s.id]='absent');  renderStudents(); updateStats(); };
                document.getElementById('saveBtn').onclick = async () => {
                    const total = students.length, marked = Object.keys(attendanceData).length;
                    if (marked < total) { showToast(`⚠️ Please mark all ${total} students. ${total-marked} remaining.`, true); return; }
                    try {
                        const r = await fetch(`${API_URL}/attendance/save`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ sectionId, attendance: attendanceData })
                        });
                        if (r.ok) { showToast('✅ Attendance saved successfully!'); modal.remove(); loadDashboard(); }
                        else { const e = await r.json(); showToast('❌ Error: ' + e.error, true); }
                    } catch (e) { showToast('❌ Error saving attendance', true); }
                };
            } catch (e) { showToast('Error loading students', true); }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // Init
        loadDashboard();
        loadUnreadCount();
        setInterval(loadUnreadCount, 60000); // refresh badge every 60s
    </script>
</body>
</html>
